services:
  playwright-safari:
    build: .
    container_name: safari-emulator
    
    volumes:
      - ./tests:/app/tests
      - ./screenshots:/app/screenshots
      - ./downloads:/app/downloads
      - ./config:/app/config
    
    working_dir: /app
    stdin_open: true
    tty: true
    
    ports:
      - "8080:8080"
      - "3000:3000"
    
    environment:
      - DISPLAY=:99
      - PLAYWRIGHT_BROWSER=webkit
    
    restart: unless-stopped